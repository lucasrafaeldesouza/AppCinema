<html>

<head>
    <meta charset=utf-8 />
    <meta name="description" content="Realex Tech Assessment">
    <link rel="stylesheet" type="text/css" href="style.css">

    <title>Pagamento</title>

    <!--[if IE]>
<script src="https://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
<![endif]-->

    <style type="text/css">
        * {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }

        @import url(https://fonts.googleapis.com/css?family=Open+Sans);

        body,
        html {
            background-color: black;
            padding: 0;
            border: 0;
            font: inherit;
            vertical-align: baseline;
            font-family: 'Open Sans', sans-serif;
        }

        #payment-form header {
            background: #666;
            padding: 15px 20px;
        }

        #payment-form header h2 {
            color: #fff;
            font-size: 1.125em;
        }

        #payment-form section.form-wrap {
            background: #edeceb;
            padding: 20px;
            color: #555759;
            font-size: 0.875em;
            border: 1px solid #ccc;
            overflow: hidden;
        }

        #payment-form form.payment_form label {
            display: block;
            padding-bottom: 10px;
        }

        #payment-form form.payment_form .cd_sec_wrap label {
            margin-left: 56px;
        }

        #payment-form section.form-wrap form input {
            height: 50px;
        }

        #payment-form section.form-wrap form input[type=text] {
            width: 100%;
            padding: 10px 20px;
        }

        #payment-form section.form-wrap form input[type=text]#ex_mm,
        #payment-form section.form-wrap form input[type=text]#ex_yy {
            width: 44%;
            padding: 10px 20px;
        }

        #payment-form section.form-wrap form input[type=text]#cd_sec {
            width: 80%;
            float: right;
            padding-right: 75px;
        }

        #payment-form section.form-wrap form .two.col.cd_sec_wrap {
            position: relative;
        }

        #payment-form section.form-wrap form .cd_tip span {
            border: 1px solid;
            border-radius: 50%;
            padding: 0 7px;
        }

        #payment-form section.form-wrap form .cd_tip {
            border-left: 1px solid #A6A6A6;
            position: absolute;
            right: 0;
            top: 29px;
            padding: 17px 12px;
            height: 49px;
        }

        #payment-form section.form-wrap form #cd_submit input[type=submit] {
            font-size: 1.800em;
            background: #009900;
            text-align: center;
            color: #fff;
            width: 100%;
            height: 60px;
            border: none;
        }

        #payment-form section.form-wrap form span.divider {
            font-size: 2em;
            padding: 0 6px;
            position: relative;
        }

        input#cd_save {
            height: 13px !important;
        }

        .section.save_details .col {
            background: #DBDBDB;
            padding: 10px;
        }

        .section {
            clear: both;
            padding: 0px;
            max-width: 600px;
            margin: 0 auto;
        }

        .col {
            display: block;
            float: left;
            margin: 1% 0 1% 0%;
        }

        .col:first-child {
            margin-left: 0;
        }

        .group:before,
        .group:after {
            content: "";
            display: table;
        }

        .group:after {
            clear: both;
        }

        .group {
            zoom: 1;
            /* For IE 6/7 */
        }

        .one {
            width: 100%;
        }

        .two {
            width: 50%;
        }

        @media only screen and (max-width: 480px) {
            .col {
                margin: 1% 0 1% 0%;
            }
        }

        @media only screen and (max-width: 480px) {

            .one,
            .two {
                width: 100%;
            }
        }
    </style>

</head>

<body>

    <center><br>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/6bpZXJgtYww" title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
    </center><br>

    <div id="payment-form" class="section">

        <header>
            <h2>Forma de pagamento</h2>
        </header>

        <section class="form-wrap">
            <form action="" class="payment_form" method="post" novalidate="">

                <!-- Card Number -->
                <div class="section">
                    <div class="one col">
                        <label for="cd_no">Numero do cartão</label>
                        <input type="text" name="cd_no" id="cd_no" required="required">
                    </div>
                </div>
                <!-- end .section -->

                <div class="section">

                    <!-- Expiry Date -->
                    <div class="two col">
                        <label for="ex_mm">Data de expiração (MM/YY)</label>
                        <input type="text" name="ex_mm" id="ex_mm" placeholder="MM" required="required">
                        <span class="divider">/</span>
                        <input type="text" name="ex_yy" id="ex_yy" placeholder="YY" required="required">
                    </div>

                    <!-- Security code -->
                    <div class="two col cd_sec_wrap">
                        <label for="cd_sec">Código de segurança</label>
                        <input type="text" name="cd_sec" id="cd_sec" required="required">
                        <div class="cd_tip">
                            <span>?</span>
                        </div>
                    </div>

                </div>
                <!-- end .section -->

                <!-- Name on card -->
                <div class="section">
                    <div class="one col">
                        <label for="cd_noc">Nome no Cartão</label>
                        <input type="text" name="cd_noc" id="cd_noc" required="required">
                    </div>
                </div>
                <!-- end .section -->

                <!-- Save Details -->
                <div class="section save_details">
                    <div class="one col">
                        <input type="checkbox" name="cd_save" id="cd_save" value="Save card details">
                        <span class="option-title">
                            Guardar detalhes do cartão
                            Estes detalhes do cartão podem ser guardados assim................
                        </span>
                        <p></p>
                    </div>
                </div>
                <!-- end .section -->


                <!-- Submit -->
                <div class="section">
                    <div id="cd_submit" class="one col">
                        <input type="submit" value="Enter">
                    </div>
                </div>

            </form>
        </section>
        <!-- end .form-wrap -->
    </div>
    <!-- end .section -->

</body>

</html>
