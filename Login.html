<html lang="pt-br">
<head> 
    <title>Login</title>
    <!--bot css-->

    <!--bot css-->
    <!--bot js-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js" integrity="sha384-W8fXfP3gkOKtndU4JGtKDvXbO53Wy8SZCQHczT5FMiiqmQfUpWbYdTil/SxwZgAN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.min.js" integrity="sha384-skAcpIdS7UcVUC05LJ9Dxay8AXcDYfBJqt1CJ85S/CFujBsIzCIv+l9liuYLaMQ/" crossorigin="anonymous"></script>
    <!--bot js-->
    <link href="https://fonts.googleapis.com/css2?family=Glory:wght@100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style type="text/css">
    div{
        max-width: 300px;
        padding-top: 5px;
        
    }
    body{
        background-image: url('https://topsuporte.com.br/wp-content/uploads/2016/09/fundocontador.jpg');
        background-repeat: no-repeat;
    }
    .teste{
        color: white;
    }
    
   </style>
</head>
<body>
 <center> 

    <div class="container"> 
    <link href="signin.css" rel="stylesheet">
</head>
<body class="text-center">
  
<main class="form-signin"><br>
<form><br>
  <img class="mb-4" src="https://conticonsultoria.com.br/wp-content/uploads/2020/09/logo-totvs.png" width="200px" height="70px" alt="" width="150" height="100">
  <h1 class="h3 mb-3 fw-normal"></h1>
  <div class="form-floating">
    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
    <label for="floatingInput">Email address</label>
  </div>
  <div class="form-floating">
    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
    <label for="floatingPassword">Password</label>
  </div>
  <div class="checkbox mb-3">
    <label>
       <div class="teste">  
      <input type="checkbox" value="remember-me"> Remember me
    </div>
    </label>
    <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
  </div>
  
</form>
</main>
</div>
</center> 

</body>
</html>
