  <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--Import Materialize-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" media="screen,projection"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <!--Custom stuff-->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans|Oswald&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customstyles.css">
    <title>Document</title>
</head>

<body>
    
    <div class="container">
     
        <div class="row">
            <form id="survey-form" class="col s12" action="#">
                <div class="row" id="form-cont">
                    <div class="input-field col s12 l5">
                        <i class="material-icons prefix"></i>
                        <input id="name" type="text" class="validate" placeholder="John Doe" required>
                        <label for="name" id="name-label">Nome Completo</label>
                    </div>
                    <div class="input-field col s12 l7">
                        <i class="material-icons prefix">email</i>
                        <input id="email" type="email" class="validate" placeholder="johndoe@gmail.com" required>
                        <label for="email" id="email-label">E-mail</label>
                        <span class="helper-text" data-error="invalid email address" data-success="valid"></span>
                    </div>
                    <div class="input-field col s12 m3 l4">
                        <i class="material-icons prefix">perm_contact_calendar</i>
                        <input id="number" type="number" min="12" max="99" class="validate" placeholder="18">
                        <label for="number" id="number-label">Age <em>(optional)</em></label>
                    </div>
                    <div class="input-field col s12 m9 l8">
                        <select id="dropdown">
                            <option value="" disabled selected>Select current role</option>
                            <option value="1">Student</option>
                            <option value="2">Full-time Job</option>
                            <option value="3">Part-time job</option>
                        </select>
                        <label>Which option best describes your current role?</label>
                    </div>
                    <div class="col s12">
                        <p>How Likely are you to reccomend our site to others?</p>
                        <label>
                            <input class="with-gap" name="likert" value="extremely" type="radio" checked />
                            <span>Extremely Likely</span>
                        </label>
                        <label>
                            <input class="with-gap" name="likert" type="radio" value="likely" checked />
                            <span>likely</span>
                        </label>
                        <label>
                            <input class="with-gap" name="likert" type="radio" value="unlikely" checked />
                            <span>unlikely</span>
                        </label>
                    </div>
                    <div class="col s12 checks">
                        <p>What would you like to see improved? (Check all that apply)</p>
                        <label>
                            <input type="checkbox" class="filled-in" checked="checked" value="tutorials" />
                            <span>Tutorials</span>
                        </label>
                        <label>
                            <input type="checkbox" class="filled-in" checked="checked" value="blog" />
                            <span>Blog posts</span>
                        </label>
                        <label>
                            <input type="checkbox" class="filled-in" checked="checked" value="content" />
                            <span>Variety of content</span>
                        </label>
                        <label>
                            <input type="checkbox" class="filled-in" checked="checked" value="forum" />
                            <span>Forum</span>
                        </label>

                    </div>
                    <div class="input-field col s12">
                        <textarea id="textarea1" class="materialize-textarea" data-length="150"></textarea>
                        <label for="textarea1">Comments or suggestions?</label>
                    </div>
                    <button id="submit" class="btn waves-effect waves-light" type="submit" name="action">Submit
                        <i class="material-icons right">send</i>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script>document.addEventListener('DOMContentLoaded', function () {
            var elems = document.querySelectorAll('select');
            var instances = M.FormSelect.init(elems, {});
        });
    </script>
</body>

</html>
