<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <title>Sócio</title>
    <!--bot css-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <!--bot css-->
    <!--bot js-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js" integrity="sha384-W8fXfP3gkOKtndU4JGtKDvXbO53Wy8SZCQHczT5FMiiqmQfUpWbYdTil/SxwZgAN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.min.js" integrity="sha384-skAcpIdS7UcVUC05LJ9Dxay8AXcDYfBJqt1CJ85S/CFujBsIzCIv+l9liuYLaMQ/" crossorigin="anonymous"></script>
    <!--bot js-->
    <link href="https://fonts.googleapis.com/css2?family=Glory:wght@100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style type="text/css">
       
    
       html {
  background: url(https://www.msccruzeiros.com.br/br_pt/Images/background_scia_tcm31-59059.jpg);
  background-size: cover;
}

html, body, .overlay {
  min-height: 100%;
  min-width: 100%;
  margin: 0;
}

body {
  position: relative;
  text-align: center;
}

.overlay {
  background-color: #000;
  opacity: .7;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10;
}

.content {
  background-color: #fff;
  height: auto;
  left: 50%;
  margin-left: -506px;
  min-height: 100%;
  position: absolute;
  width: 1012px;
  z-index: 11;
}

.main {
  margin: auto;
  padding: 30px 70px;
  text-align: left;
  width: 100%;
}

.top-bar {
  background-color: black;
  padding: 30px;
}

.form-group, button {
  margin-top: 20px;
}

* {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }

        @import url(https://fonts.googleapis.com/css?family=Open+Sans);

        body,
        html {
            background-color: black;
            padding: 0;
            border: 0;
            font: inherit;
            vertical-align: baseline;
            font-family: 'Open Sans', sans-serif;
        }

        #payment-form header {
            background: #666;
            padding: 15px 20px;
        }

        #payment-form header h2 {
            color: #fff;
            font-size: 1.125em;
        }

        #payment-form section.form-wrap {
            background: #edeceb;
            padding: 20px;
            color: #555759;
            font-size: 0.875em;
            border: 1px solid #ccc;
            overflow: hidden;
        }

        #payment-form form.payment_form label {
            display: block;
            padding-bottom: 10px;
        }

        #payment-form form.payment_form .cd_sec_wrap label {
            margin-left: 56px;
        }

        #payment-form section.form-wrap form input {
            height: 50px;
        }

        #payment-form section.form-wrap form input[type=text] {
            width: 100%;
            padding: 10px 20px;
        }

        #payment-form section.form-wrap form input[type=text]#ex_mm,
        #payment-form section.form-wrap form input[type=text]#ex_yy {
            width: 44%;
            padding: 10px 20px;
        }

        #payment-form section.form-wrap form input[type=text]#cd_sec {
            width: 80%;
            float: right;
            padding-right: 75px;
        }

        #payment-form section.form-wrap form .two.col.cd_sec_wrap {
            position: relative;
        }

        #payment-form section.form-wrap form .cd_tip span {
            border: 1px solid;
            border-radius: 50%;
            padding: 0 7px;
        }

        #payment-form section.form-wrap form .cd_tip {
            border-left: 1px solid #A6A6A6;
            position: absolute;
            right: 0;
            top: 29px;
            padding: 17px 12px;
            height: 49px;
        }

        #payment-form section.form-wrap form #cd_submit input[type=submit] {
            font-size: 1.800em;
            background: #009900;
            text-align: center;
            color: #fff;
            width: 100%;
            height: 60px;
            border: none;
        }

        #payment-form section.form-wrap form span.divider {
            font-size: 2em;
            padding: 0 6px;
            position: relative;
        }

        input#cd_save {
            height: 13px !important;
        }

        .section.save_details .col {
            background: #DBDBDB;
            padding: 10px;
        }

        .section {
            clear: both;
            padding: 0px;
            max-width: 600px;
            margin: 0 auto;
        }

        .col {
            display: block;
            float: left;
            margin: 1% 0 1% 0%;
        }

        .col:first-child {
            margin-left: 0;
        }

        .group:before,
        .group:after {
            content: "";
            display: table;
        }

        .group:after {
            clear: both;
        }

        .group {
            zoom: 1;
            /* For IE 6/7 */
        }

        .one {
            width: 100%;
        }

        .two {
            width: 50%;
        }

        @media only screen and (max-width: 480px) {
            .col {
                margin: 1% 0 1% 0%;
            }
        }

        @media only screen and (max-width: 480px) {

            .one,
            .two {
                width: 100%;
            }
        }
       
       
    </style>

</head>
<body>

  <div class="overlay">
  </div>
  
  <div class="content">
    <div class="top-bar">
      <img src="https://www.msccruzeiros.com.br/br_pt/Images/msccruzeiros_tcm31-113.jpg" alt="" class="logo" />
    </div>
    
    <div class="main">
      <div class="container-fluid">
        
        <h3>Sócio Cinemik</h3>
        <form>
          <div class="form-group">
            <label for="exampleInputEmail1">Nome</label>
            <select name="" id="" class="form-control">
              
              
            </select>
          </div>
  
          <div class="form-group">
            <label for="exampleInputEmail1">Estado</label>
            <select name="" id="" class="form-control">
             
            </select>
          </div>      
  
          <div class="form-group">
            <label for="exampleInputPassword1">Cidade</label>
            <input type="text" class="form-control" id="" placeholder="">
          </div>
          
          <div class="row">
            <div class="form-group col-xs-8">
              <label for="exampleInputPassword1">Endereço</label>
              <input type="text" class="form-control" id="numero-da-nota" placeholder="">
            </div>
  
            <div class="form-group col-xs-4">
              <label for="exampleInputPassword1">CEP</label>
              <input type="text" class="form-control" id="data-da-nota" placeholder="">
            </div>
          </div> <!-- // row -->
          
          <div class="row">
            <div class="form-group col-xs-4">
              <label for="exampleInputPassword1">CPF</label>
              <input type="text" class="form-control" id="valor-da-nota" placeholder="">
            </div>
            
            <div class="form-group col-xs-4">
              <label for="exampleInputPassword1">RG</label>
              <input type="text" class="form-control" id="valor-da-nota" placeholder="">
            </div>
            
          
          
          <div class="form-group">
            <label for="exampleInputFile">Ao associar-se</label>
            
            <p class="help-block">Você terá muitos descontos em produtos e poderá comprar ingressos na pré venda</p>
          </div>
  
          <div class="row">
            <div class="col-xs-12">
              <button type="submit" class="btn btn-primary">Assinar</button>
            </div>
          </div>
  
        </form>
      </div> <!-- // container -->
    </div> <!-- // main -->
  </div> <!-- // content -->

  <div id="payment-form" class="section">

    <header>
        <h2>Forma de pagamento</h2>
    </header>

    <section class="form-wrap">
        <form action="" class="payment_form" method="post" novalidate="">

            <!-- Card Number -->
            <div class="section">
                <div class="one col">
                    <label for="cd_no">Numero do cartão</label>
                    <input type="text" name="cd_no" id="cd_no" required="required">
                </div>
            </div>
            <!-- end .section -->

            <div class="section">

                <!-- Expiry Date -->
                <div class="two col">
                    <label for="ex_mm">Data de expiração (MM/YY)</label>
                    <input type="text" name="ex_mm" id="ex_mm" placeholder="MM" required="required">
                    <span class="divider">/</span>
                    <input type="text" name="ex_yy" id="ex_yy" placeholder="YY" required="required">
                </div>

                <!-- Security code -->
                <div class="two col cd_sec_wrap">
                    <label for="cd_sec">Código de segurança</label>
                    <input type="text" name="cd_sec" id="cd_sec" required="required">
                    <div class="cd_tip">
                        <span>?</span>
                    </div>
                </div>

            </div>
            <!-- end .section -->

            <!-- Name on card -->
            <div class="section">
                <div class="one col">
                    <label for="cd_noc">Nome no Cartão</label>
                    <input type="text" name="cd_noc" id="cd_noc" required="required">
                </div>
            </div>
            <!-- end .section -->

            <!-- Save Details -->
            <div class="section save_details">
                <div class="one col">
                    <input type="checkbox" name="cd_save" id="cd_save" value="Save card details">
                    <span class="option-title">
                        Guardar detalhes do cartão
                        Estes detalhes do cartão podem ser guardados assim................
                    </span>
                    <p></p>
                </div>
            </div>
            <!-- end .section -->


            <!-- Submit -->
            <div class="section">
                <div id="cd_submit" class="one col">
                    <input type="submit" value="Enter">
                </div>
            </div>

        </form>
    </section>
    <!-- end .form-wrap -->
</div>
<!-- end .section -->


</body>
</html>
